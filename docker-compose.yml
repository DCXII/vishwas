services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    pull_policy: if_not_present
    container_name: vishwas-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: vishwas
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vishwas-network
    restart: unless-stopped

  # Face Recognition Service (Python)
  face-service:
    build:
      context: ./face_service
      dockerfile: Dockerfile
    container_name: vishwas-face-service
    ports:
      - "5002:5002"
    volumes:
      - ./face_service/uploads:/app/uploads
      - ./face_service/source_images:/app/source_images
      - ./face_detection_model:/face_detection_model
    environment:
      FLASK_ENV: production
      FLASK_APP: app.py
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/vishwas?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5002/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - vishwas-network
    restart: unless-stopped

  # Backend API (Node.js/Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vishwas-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
      - ./backend/wallet:/app/wallet
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/vishwas?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      FACE_SERVICE_URL: http://face-service:5002
      BLOCKCHAIN_LEDGER: mongodb
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
      face-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/" ]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - vishwas-network
    restart: unless-stopped

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000
    container_name: vishwas-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_FACE_SERVICE_URL: http://localhost:5002
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/" ]
      interval: 20s
      timeout: 10s
      retries: 3
    networks:
      - vishwas-network
    restart: unless-stopped

  # Redis Cache (Optional - for session management)
  redis:
    image: redis:7-alpine
    pull_policy: if_not_present
    container_name: vishwas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - vishwas-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    pull_policy: if_not_present
    container_name: vishwas-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - vishwas-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  vishwas-network:
    driver: bridge
