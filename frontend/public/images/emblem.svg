<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <title>State Emblem of India</title>
  
  <defs>
    <style>
      .emblem-primary { fill: #13437C; }
      .emblem-secondary { fill: #8B0000; }
      .emblem-gold { fill: #D4AF37; }
    </style>
  </defs>

  <!-- Lion Capital Base -->
  <g transform="translate(150,100)" class="emblem-primary">
    <path d="M-80,20 C-60,10 60,10 80,20 L90,40 H-90 L-80,20" />
  </g>

  <!-- Four Lions -->
  <g transform="translate(150,80)" class="emblem-primary">
    <!-- Front Lion -->
    <path d="M-20,0 C0,-30 20,-30 40,0 C30,20 -10,20 -20,0 Z" />
    <path d="M-15,-10 C0,-25 15,-25 35,-10" fill="none" stroke="#13437C" stroke-width="2"/>
    
    <!-- Left Lion -->
    <path d="M-60,-10 C-40,-40 -20,-40 0,-10 C-10,10 -50,10 -60,-10 Z" transform="rotate(-30)" />
    
    <!-- Right Lion -->
    <path d="M0,-10 C20,-40 40,-40 60,-10 C50,10 10,10 0,-10 Z" transform="rotate(30)" />
    
    <!-- Back Lion (suggested) -->
    <ellipse cx="0" cy="-20" rx="30" ry="10"/>
  </g>

  <!-- Ashoka Chakra -->
  <g transform="translate(150,200)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#13437C" stroke-width="3"/>
    
    <!-- 24 Spokes -->
    <g id="spokes">
      <g id="spoke">
        <line x1="0" y1="-48" x2="0" y2="48" stroke="#13437C" stroke-width="2"/>
        <circle cx="0" cy="-45" r="2" class="emblem-primary"/>
        <circle cx="0" cy="45" r="2" class="emblem-primary"/>
      </g>
      <use href="#spoke" transform="rotate(15)"/>
      <use href="#spoke" transform="rotate(30)"/>
      <use href="#spoke" transform="rotate(45)"/>
      <use href="#spoke" transform="rotate(60)"/>
      <use href="#spoke" transform="rotate(75)"/>
      <use href="#spoke" transform="rotate(90)"/>
      <use href="#spoke" transform="rotate(105)"/>
      <use href="#spoke" transform="rotate(120)"/>
      <use href="#spoke" transform="rotate(135)"/>
      <use href="#spoke" transform="rotate(150)"/>
      <use href="#spoke" transform="rotate(165)"/>
      <use href="#spoke" transform="rotate(180)"/>
      <use href="#spoke" transform="rotate(195)"/>
      <use href="#spoke" transform="rotate(210)"/>
      <use href="#spoke" transform="rotate(225)"/>
      <use href="#spoke" transform="rotate(240)"/>
      <use href="#spoke" transform="rotate(255)"/>
      <use href="#spoke" transform="rotate(270)"/>
      <use href="#spoke" transform="rotate(285)"/>
      <use href="#spoke" transform="rotate(300)"/>
      <use href="#spoke" transform="rotate(315)"/>
      <use href="#spoke" transform="rotate(330)"/>
      <use href="#spoke" transform="rotate(345)"/>
    </g>
  </g>

  <!-- Lotus Base -->
  <g transform="translate(150,300)">
    <!-- Lotus Petals -->
    <g class="emblem-primary">
      <path d="M-70,-10 C-50,20 50,20 70,-10" fill="none" stroke="#13437C" stroke-width="3"/>
      <path d="M-60,-25 C-40,5 40,5 60,-25" fill="none" stroke="#13437C" stroke-width="3"/>
      <path d="M-50,-40 C-30,-10 30,-10 50,-40" fill="none" stroke="#13437C" stroke-width="3"/>
    </g>
  </g>

  <!-- Devanagari Text -->
  <g transform="translate(150,350)" class="emblem-primary">
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">सत्यमेव जयते</text>
  </g>
</svg>